spring.application.name=ssmup

# Configuracoes do Banco de Dados
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:ssmup}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA e Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID}

# JWT Configuration
jwt.secret=9a8s7d98a7sd987a9sd87a9sd87a9sd87a9sd87a9sd87a9sd87a9sd87
jwt.expiration=900000
jwt.refresh-expiration=604800000

server.port=${SERVER_PORT:8080}

# Redis Configuration
spring.cache.type=redis
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Solr
spring.data.solr.host=${SOLR_URL:http://localhost:8983/solr}


# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL do frontend
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5000}
